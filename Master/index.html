<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin - Confronter Tech Wizard VCF</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: #374151;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            font-size: 14px;
            font-weight: 600;
        }

        .clock {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .battery {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .battery-icon {
            width: 28px;
            height: 14px;
            border: 2px solid var(--text);
            border-radius: 3px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -5px;
            width: 3px;
            height: 6px;
            background: var(--text);
            border-radius: 0 2px 2px 0;
        }

        .battery-level {
            height: 100%;
            background: var(--success);
            border-radius: 1px;
            transition: width 0.5s;
        }

        .battery-level.low {
            background: var(--danger);
        }

        .battery-level.medium {
            background: var(--warning);
        }

        .charging {
            color: var(--success);
            font-size: 12px;
        }

        .hidden {
            display: none !important;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 0;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat-num {
            font-size: 2em;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .member-card {
            border-left: 4px solid var(--primary);
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .member-name {
            font-size: 1.2em;
            font-weight: 700;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        [data-theme="dark"] .badge-pending {
            background: #451a03;
            color: #fbbf24;
        }

        .badge-verified {
            background: #d1fae5;
            color: #065f46;
        }

        [data-theme="dark"] .badge-verified {
            background: #064e3b;
            color: #34d399;
        }

        .badge-expired {
            background: #fee2e2;
            color: #991b1b;
        }

        [data-theme="dark"] .badge-expired {
            background: #450a0a;
            color: #f87171;
        }

        .info-grid {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-label {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: var(--primary);
        }

        .timer.expired {
            color: var(--danger);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 3em;
            margin-bottom: 12px;
        }

        .admin-login {
            max-width: 400px;
            margin: 0 auto;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: pop 0.3s ease;
            box-shadow: var(--shadow);
        }

        @keyframes pop {
            from { transform: translateX(-50%) scale(0.8); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .toast-ok { background: var(--success); }
        .toast-err { background: var(--danger); }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .vcf-code {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            color: var(--text);
        }

        @media (max-width: 600px) {
            .stats {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.4em;
            }
            .actions {
                justify-content: stretch;
            }
            .actions .btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="clock" id="clock">00:00:00</div>
            <div class="battery" id="battery">
                <span class="charging hidden" id="charging">⚡</span>
                <div class="battery-icon">
                    <div class="battery-level" id="batteryLevel" style="width: 0%"></div>
                </div>
                <span id="batteryPercent">--%</span>
            </div>
        </div>

        <div class="header">
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
            <h1>🔐 Admin Portal</h1>
            <p class="subtitle">Confronter Tech Wizard VCF</p>
        </div>

        <div id="adminLogin">
            <div class="card admin-login">
                <h2 style="text-align: center; margin-bottom: 24px;">Admin Access</h2>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPass" placeholder="Enter password" onkeypress="if(event.key==='Enter')loginAdmin()">
                </div>
                <button class="btn btn-primary" onclick="loginAdmin()" style="width: 100%;">Login</button>
                <p style="text-align: center; margin-top: 12px; font-size: 12px; color: var(--text-secondary);">Default: admin123</p>
            </div>
        </div>

        <div id="adminDash" class="hidden">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-num" id="statTotal">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="statPending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="statVerified">0</div>
                    <div class="stat-label">Verified</div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2>Members</h2>
                <button class="btn btn-danger btn-sm" onclick="logoutAdmin()">Logout</button>
            </div>

            <div id="membersList">
                <div class="empty">
                    <div class="empty-icon">📭</div>
                    <p>No members yet</p>
                </div>
            </div>
        </div>

        <div class="back-link">
            <a href="index.html">← Back to Member Page</a>
        </div>
    </div>

    <div id="modal" class="modal-bg hidden" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-head">
                <h3>VCF Preview</h3>
                <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);">×</button>
            </div>
            <div class="vcf-code" id="vcfCode"></div>
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button class="btn btn-success" onclick="downloadCurrentVCF()">⬇ Download</button>
                <button class="btn btn-primary" onclick="shareCurrentVCF()">📤 Share</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'confronter_vcf_data';
        const ADMIN_PASS = 'admin123';
        let currentVCF = null;
        let currentMemberId = null;

        function getData() {
            const d = localStorage.getItem(STORAGE_KEY);
            return d ? JSON.parse(d) : { members: [] };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function initBattery() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    updateBattery(battery);
                    battery.addEventListener('levelchange', () => updateBattery(battery));
                    battery.addEventListener('chargingchange', () => updateBattery(battery));
                } catch (e) {
                    document.getElementById('batteryPercent').textContent = 'N/A';
                }
            } else {
                document.getElementById('batteryPercent').textContent = 'N/A';
            }
        }

        function updateBattery(battery) {
            const percent = Math.round(battery.level * 100);
            const levelEl = document.getElementById('batteryLevel');
            const percentEl = document.getElementById('batteryPercent');
            const chargingEl = document.getElementById('charging');

            levelEl.style.width = percent + '%';
            percentEl.textContent = percent + '%';

            levelEl.classList.remove('low', 'medium');
            if (percent <= 20) levelEl.classList.add('low');
            else if (percent <= 50) levelEl.classList.add('medium');

            if (battery.charging) {
                chargingEl.classList.remove('hidden');
            } else {
                chargingEl.classList.add('hidden');
            }
        }

        function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASS) {
                sessionStorage.setItem('adminIn', '1');
                showAdminDash();
                toast('Welcome Admin!', 'ok');
            } else {
                toast('Wrong password!', 'err');
            }
        }

        function logoutAdmin() {
            sessionStorage.removeItem('adminIn');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminDash').classList.add('hidden');
            document.getElementById('adminPass').value = '';
        }

        function showAdminDash() {
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminDash').classList.remove('hidden');
            refreshAdmin();
        }

        function refreshAdmin() {
            const data = getData();
            const total = data.members.length;
            const pending = data.members.filter(x => x.status === 'pending').length;
            const verified = data.members.filter(x => x.status === 'verified').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statVerified').textContent = verified;

            const list = document.getElementById('membersList');
            if (!total) {
                list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No members yet</p></div>`;
                return;
            }

            const sorted = [...data.members].sort((a, b) => {
                if (a.status === 'pending' && b.status !== 'pending') return -1;
                if (a.status !== 'pending' && b.status === 'pending') return 1;
                return b.createdAt - a.createdAt;
            });

            list.innerHTML = sorted.map(m => {
                const elapsed = Date.now() - m.createdAt;
                const remaining = (m.duration * 3600000) - elapsed;

                if (remaining <= 0 && m.status === 'pending') {
                    m.status = 'expired';
                    saveData(data);
                }

                return `
                <div class="card member-card">
                    <div class="member-header">
                        <span class="member-name">🪅🪅 ${esc(m.fullName)}</span>
                        <span class="badge badge-${m.status}">${m.status}</span>
                    </div>
                    <div class="info-grid">
                        <div class="info-row"><span class="info-label">ID</span><span>${m.id}</span></div>
                        <div class="info-row"><span class="info-label">Phone</span><span>${esc(m.phone)}</span></div>
                        <div class="info-row"><span class="info-label">Email</span><span>${esc(m.email)}</span></div>
                        <div class="info-row"><span class="info-label">Duration</span><span>${m.duration} Hour(s)</span></div>
                        <div class="info-row"><span class="info-label">Submitted</span><span>${new Date(m.createdAt).toLocaleString()}</span></div>
                        ${m.status === 'pending' ? `<div class="info-row"><span class="info-label">Time Left</span><span class="timer ${remaining <= 0 ? 'expired' : ''}">${fmtTime(remaining)}</span></div>` : ''}
                        ${m.verifiedAt ? `<div class="info-row"><span class="info-label">Verified</span><span>${new Date(m.verifiedAt).toLocaleString()}</span></div>` : ''}
                    </div>
                    <div class="actions">
                        ${m.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="verifyMember('${m.id}')">✓ Verify</button>` : ''}
                        ${m.status === 'verified' ? `
                            <button class="btn btn-primary btn-sm" onclick="previewVCF('${m.id}')">👁 Preview</button>
                            <button class="btn btn-success btn-sm" onclick="dlMember('${m.id}')">⬇ Download</button>
                            <button class="btn btn-primary btn-sm" onclick="shareMember('${m.id}')">📤 Share</button>
                        ` : ''}
                        <button class="btn btn-danger btn-sm" onclick="delMember('${m.id}')">🗑 Delete</button>
                    </div>
                </div>`;
            }).join('');
        }

        function verifyMember(id) {
            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (m) {
                m.status = 'verified';
                m.verifiedAt = Date.now();
                saveData(data);
                refreshAdmin();
                toast('Member verified!', 'ok');
            }
        }

        function delMember(id) {
            if (!confirm('Delete this member?')) return;
            const data = getData();
            data.members = data.members.filter(x => x.id !== id);
            saveData(data);
            refreshAdmin();
            toast('Deleted!', 'ok');
        }

        function genVCF(m) {
            return [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:🪅🪅 ${m.fullName}`,
                `N:${m.fullName.split(' ').reverse().join(';')};;;`,
                `TEL;TYPE=CELL:${m.phone}`,
                `EMAIL;TYPE=WORK:${m.email}`,
                `REV:${new Date().toISOString()}`,
                'END:VCARD'
            ].join('\r\n');
        }

        function previewVCF(id) {
            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (!m) return;
            currentVCF = genVCF(m);
            currentMemberId = id;
            document.getElementById('vcfCode').textContent = currentVCF;
            document.getElementById('modal').classList.remove('hidden');
        }

        function dlMember(id) {
            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (!m) return;

            const vcf = genVCF(m);
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `🪅🪅_${m.fullName.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            toast('VCF downloaded!', 'ok');
        }

        function downloadCurrentVCF() {
            if (!currentMemberId) return;
            dlMember(currentMemberId);
        }

        function shareMember(id) {
            previewVCF(id);
            setTimeout(() => shareCurrentVCF(), 100);
        }

        function shareCurrentVCF() {
            if (!currentVCF || !currentMemberId) return;
            const data = getData();
            const m = data.members.find(x => x.id === currentMemberId);
            if (!m) return;

            if (navigator.share) {
                const blob = new Blob([currentVCF], { type: 'text/vcard' });
                const file = new File([blob], `🪅🪅_${m.fullName.replace(/\s+/g, '_')}.vcf`, { type: 'text/vcard' });
                navigator.share({
                    title: `🪅🪅 ${m.fullName}`,
                    text: `Contact card for 🪅🪅 ${m.fullName}`,
                    files: [file]
                }).catch(() => copyVCF());
            } else {
                copyVCF();
            }
        }

        function copyVCF() {
            navigator.clipboard.writeText(currentVCF).then(() => toast('Copied to clipboard!', 'ok')).catch(() => toast('Copy failed', 'err'));
        }

        function closeModal(e) {
            if (!e || e.target.id === 'modal') {
                document.getElementById('modal').classList.add('hidden');
                currentVCF = null;
                currentMemberId = null;
            }
        }

        function esc(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function fmtTime(ms) {
            if (ms <= 0) return 'EXPIRED';
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        initTheme();
        initBattery();

        if (sessionStorage.getItem('adminIn')) {
            showAdminDash();
        }

        setInterval(() => {
            if (sessionStorage.getItem('adminIn') && !document.getElementById('adminDash').classList.contains('hidden')) {
                refreshAdmin();
            }
        }, 30000);
    </script>
</body>
</html>
