<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪅🪅 Confronter Tech Wizard VCF</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --text: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: #374151;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            font-size: 14px;
            font-weight: 600;
        }

        .clock {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .battery {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .battery-icon {
            width: 28px;
            height: 14px;
            border: 2px solid var(--text);
            border-radius: 3px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -5px;
            width: 3px;
            height: 6px;
            background: var(--text);
            border-radius: 0 2px 2px 0;
        }

        .battery-level {
            height: 100%;
            background: var(--success);
            border-radius: 1px;
            transition: width 0.5s;
        }

        .battery-level.low {
            background: var(--danger);
        }

        .battery-level.medium {
            background: var(--warning);
        }

        .charging {
            color: var(--success);
            font-size: 12px;
        }

        .hidden {
            display: none !important;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 0;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .timer {
            font-family: 'Courier New', monospace;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.3em;
            margin-top: 12px;
        }

        .timer.expired {
            color: var(--danger);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: pop 0.3s ease;
            box-shadow: var(--shadow);
        }

        @keyframes pop {
            from { transform: translateX(-50%) scale(0.8); opacity: 0; }
            to { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        .toast-ok { background: var(--success); }
        .toast-err { background: var(--danger); }

        .admin-link {
            text-align: center;
            margin-top: 20px;
        }

        .admin-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }

        .admin-link a:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <div class="clock" id="clock">00:00:00</div>
            <div class="battery" id="battery">
                <span class="charging hidden" id="charging">⚡</span>
                <div class="battery-icon">
                    <div class="battery-level" id="batteryLevel" style="width: 0%"></div>
                </div>
                <span id="batteryPercent">--%</span>
            </div>
        </div>

        <div class="header">
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
            <h1>🪅🪅 Confronter Tech Wizard</h1>
            <p class="subtitle">VCF Contact Generator</p>
        </div>

        <div id="memberForm">
            <div class="card">
                <form onsubmit="submitMember(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required placeholder="+1 555 123 4567">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Verification Duration</label>
                        <select id="duration">
                            <option value="1">1 Hour</option>
                            <option value="6">6 Hours</option>
                            <option value="24" selected>24 Hours</option>
                            <option value="72">3 Days</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">🚀 Submit for Verification</button>
                </form>
            </div>
        </div>

        <div id="memberPending" class="hidden">
            <div class="card" style="text-align: center; padding: 40px;">
                <div style="font-size: 3em; margin-bottom: 16px;">⏳</div>
                <h2 style="margin-bottom: 8px;">Pending Verification</h2>
                <p style="color: var(--text-secondary); margin-bottom: 16px;">Admin will verify your profile</p>
                <div class="timer" id="pendingTimer">00:00:00</div>
                <p style="margin-top: 16px; font-size: 12px; color: var(--text-secondary);">ID: <span id="pendingId"></span></p>
            </div>
        </div>

        <div id="memberVerified" class="hidden">
            <div class="card" style="text-align: center; padding: 40px;">
                <div style="font-size: 3em; margin-bottom: 16px;">✅</div>
                <h2 style="margin-bottom: 8px;">Verified!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">Your profile is approved</p>
                <button class="btn btn-success" onclick="downloadMyVCF()">📥 Download My VCF</button>
            </div>
        </div>

        <div class="admin-link">
            <a href="admin.html">🔐 Admin Portal</a>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'confronter_vcf_data';

        function getData() {
            const d = localStorage.getItem(STORAGE_KEY);
            return d ? JSON.parse(d) : { members: [] };
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcon(saved);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            document.getElementById('themeBtn').textContent = theme === 'light' ? '🌙' : '☀️';
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function initBattery() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    updateBattery(battery);
                    battery.addEventListener('levelchange', () => updateBattery(battery));
                    battery.addEventListener('chargingchange', () => updateBattery(battery));
                } catch (e) {
                    document.getElementById('batteryPercent').textContent = 'N/A';
                }
            } else {
                document.getElementById('batteryPercent').textContent = 'N/A';
            }
        }

        function updateBattery(battery) {
            const percent = Math.round(battery.level * 100);
            const levelEl = document.getElementById('batteryLevel');
            const percentEl = document.getElementById('batteryPercent');
            const chargingEl = document.getElementById('charging');

            levelEl.style.width = percent + '%';
            percentEl.textContent = percent + '%';

            levelEl.classList.remove('low', 'medium');
            if (percent <= 20) levelEl.classList.add('low');
            else if (percent <= 50) levelEl.classList.add('medium');

            if (battery.charging) {
                chargingEl.classList.remove('hidden');
            } else {
                chargingEl.classList.add('hidden');
            }
        }

        function submitMember(e) {
            e.preventDefault();

            const member = {
                id: 'M' + Date.now().toString(36).toUpperCase(),
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                duration: parseInt(document.getElementById('duration').value),
                createdAt: Date.now(),
                status: 'pending',
                verifiedAt: null
            };

            const data = getData();
            data.members.push(member);
            saveData(data);

            localStorage.setItem('myMemberId', member.id);
            showPending(member.id);
            toast('Submitted for verification!', 'ok');
        }

        function showPending(id) {
            document.getElementById('memberForm').classList.add('hidden');
            document.getElementById('memberPending').classList.remove('hidden');
            document.getElementById('pendingId').textContent = id;
            updatePendingTimer(id);
            setInterval(() => updatePendingTimer(id), 1000);
        }

        function updatePendingTimer(id) {
            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (!m) return;

            if (m.status === 'verified') {
                document.getElementById('memberPending').classList.add('hidden');
                document.getElementById('memberVerified').classList.remove('hidden');
                return;
            }

            const elapsed = Date.now() - m.createdAt;
            const remaining = (m.duration * 3600000) - elapsed;
            const el = document.getElementById('pendingTimer');

            if (remaining <= 0) {
                m.status = 'expired';
                saveData(data);
                el.textContent = 'EXPIRED';
                el.classList.add('expired');
                return;
            }

            const h = Math.floor(remaining / 3600000);
            const min = Math.floor((remaining % 3600000) / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            el.textContent = `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function checkMyStatus() {
            const id = localStorage.getItem('myMemberId');
            if (!id) return;

            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (!m) {
                localStorage.removeItem('myMemberId');
                return;
            }

            if (m.status === 'verified') {
                document.getElementById('memberForm').classList.add('hidden');
                document.getElementById('memberVerified').classList.remove('hidden');
            } else if (m.status === 'pending') {
                showPending(id);
            }
        }

        function genVCF(m) {
            return [
                'BEGIN:VCARD',
                'VERSION:3.0',
                `FN:🪅🪅 ${m.fullName}`,
                `N:${m.fullName.split(' ').reverse().join(';')};;;`,
                `TEL;TYPE=CELL:${m.phone}`,
                `EMAIL;TYPE=WORK:${m.email}`,
                `REV:${new Date().toISOString()}`,
                'END:VCARD'
            ].join('\r\n');
        }

        function downloadMyVCF() {
            const id = localStorage.getItem('myMemberId');
            if (!id) return;
            const data = getData();
            const m = data.members.find(x => x.id === id);
            if (!m) return;

            const vcf = genVCF(m);
            const blob = new Blob([vcf], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `🪅🪅_${m.fullName.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
            toast('VCF downloaded!', 'ok');
        }

        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        initTheme();
        initBattery();
        checkMyStatus();
    </script>
</body>
</html>
